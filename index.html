<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CleanBot</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100vh; -webkit-overflow-scrolling: touch; overflow-y: auto; }
  body { font-family: 'DM Sans', sans-serif; background: #f8fafc; color: #0f172a; padding: 10px; }
  .header { background: linear-gradient(135deg, #0c4a6e, #0369a1); border-radius: 16px; padding: 14px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; flex-wrap: nowrap; }
  .header-logo { width: 52px; height: 52px; border-radius: 12px; background: white; flex-shrink: 0; overflow: hidden; padding: 3px; }
  .header-logo img { width: 100%; height: 100%; object-fit: contain; }
  .header-texto { flex: 1; min-width: 0; overflow: hidden; }
  .header-title { font-family: 'Syne', sans-serif; font-size: 19px; font-weight: 800; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .header-sub { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(16,185,129,0.2); border: 1px solid rgba(16,185,129,0.4); color: #6ee7b7; font-size: 11px; font-weight: 600; padding: 4px 8px; border-radius: 20px; flex-shrink: 0; white-space: nowrap; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #6ee7b7; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
  .card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 14px; margin-bottom: 10px; }
  .label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 10px; }
  .mes-actual { display: flex; align-items: center; gap: 10px; }
  .mes-icon { width: 46px; height: 46px; border-radius: 12px; overflow: hidden; flex-shrink: 0; }
  .mes-icon img { width: 100%; height: 100%; object-fit: cover; }
  .mes-info { flex: 1; min-width: 0; }
  .mes-nombre { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; color: #0f172a; }
  .mes-coord { font-size: 12px; color: #64748b; margin-top: 2px; }
  .mes-badge { background: #dbeafe; color: #1d4ed8; font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 8px; white-space: nowrap; flex-shrink: 0; }
  .semanas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
  .semana-item { border-radius: 10px; padding: 10px; border: 1px solid #e2e8f0; }
  .semana-item.enviado { background: #dcfce7; border-color: #86efac; }
  .semana-item.pendiente { background: #fefce8; border-color: #fde047; }
  .semana-titulo { font-size: 11px; font-weight: 600; margin-bottom: 4px; }
  .semana-titulo.enviado { color: #16a34a; }
  .semana-titulo.pendiente { color: #a16207; }
  .semana-estado { font-size: 13px; font-weight: 600; color: #0f172a; }
  .meses-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .mes-card { background: #f8fafc; border-radius: 10px; padding: 10px; border: 1px solid #e2e8f0; display: flex; gap: 8px; align-items: center; }
  .mes-card.activo { background: #dcfce7; border-color: #86efac; }
  .mes-card-img { width: 32px; height: 32px; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
  .mes-card-img img { width: 100%; height: 100%; object-fit: cover; }
  .mes-card-info { flex: 1; min-width: 0; }
  .mes-card-mes { font-size: 10px; color: #94a3b8; margin-bottom: 2px; }
  .mes-card-mes.activo { color: #16a34a; font-weight: 600; }
  .mes-card-nombre { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mes-card-coord { font-size: 11px; color: #64748b; }
  .loading { text-align: center; padding: 2rem; color: #64748b; font-size: 14px; }
  .footer { text-align: center; font-size: 11px; color: #94a3b8; margin-top: 10px; padding-bottom: 16px; }
</style>
</head>

REAREQBERAEREAREQBERAEREAREQBERAEREB//2Q==';
const API_URL = 'https://script.google.com/macros/s/AKfycbxwQXZer7FMjPsudKI4Cm0XUO9G7WNR_zUHi3du9wLPvrom3Ad55WcUS_1qs6DA6QHZ/exec';
const meses = ['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

fetch(API_URL)
  .then(r => r.json())
  .then(data => {
    const actual = data.congregaciones.find(c => c.esActual);
    const mesActualNum = data.mesActual;
    let html = '';

    if (actual) {
      const semanas = [
        { num: 'S1', dia: 'Día 1', estado: actual.semana1 },
        { num: 'S2', dia: 'Día 8', estado: actual.semana2 },
        { num: 'S3', dia: 'Día 15', estado: actual.semana3 },
        { num: 'S4', dia: 'Día 22', estado: actual.semana4 },
      ];

      html += `
        <div class="card">
          <div class="label">⛪ Turno este mes — ${meses[mesActualNum]}</div>
          <div class="mes-actual">
            <div class="mes-icon"><img src="${SALON_IMG}" alt="Salón"></div>
            <div class="mes-info">
              <div class="mes-nombre">${actual.congregacion}</div>
              <div class="mes-coord">Coordinador: ${actual.coordinador}</div>
            </div>
            <div class="mes-badge">Mes ${mesActualNum}</div>
          </div>
          <div class="semanas-grid">`;

      semanas.forEach(s => {
        const esEnviado = s.estado === 'Enviado' || s.estado === '✅ Enviado';
        const clase = esEnviado ? 'enviado' : 'pendiente';
        const icono = esEnviado ? '✅' : '⏳';
        html += `
          <div class="semana-item ${clase}">
            <div class="semana-titulo ${clase}">${s.num} — ${s.dia}</div>
            <div class="semana-estado">${icono} ${esEnviado ? 'Enviado' : 'Pendiente'}</div>
          </div>`;
      });

      html += `</div></div>`;
    }

    html += `<div class="card"><div class="label">📅 Calendario del año</div><div class="meses-grid">`;
    data.congregaciones.forEach(c => {
      const esActivo = c.esActual;
      html += `
        <div class="mes-card ${esActivo ? 'activo' : ''}">
          <div class="mes-card-img"><img src="${SALON_IMG}" alt="Salón"></div>
          <div class="mes-card-info">
            <div class="mes-card-mes ${esActivo ? 'activo' : ''}">${meses[c.mes]}</div>
            <div class="mes-card-nombre">${c.congregacion}</div>
            <div class="mes-card-coord">${c.coordinador}</div>
          </div>
        </div>`;
    });
    html += `</div></div>`;

    document.getElementById('contenido').innerHTML = html;
  })
  .catch(() => {
    document.getElementById('contenido').innerHTML = `<div style="text-align:center;padding:2rem;color:#dc2626;">No se pudo cargar la información.</div>`;
  });
</script>
</body>
</html>
